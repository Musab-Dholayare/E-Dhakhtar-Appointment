<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Dhakhtar</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <h1>E-Dhakhtar</h1>
      <p>Smart Patient Appointment & Clinic Analytics</p>
    </header>
    <main class="container">
      <section class="booking-section">
        <div class="card">
          <h2 class="apointment-title"><i  class="fa-solid fa-book-medical icon"></i> New Appointment</h2>
          <form id="appointmentForm">
            <div class="form-group">
                
              <input
                type="text"
                id="patientName"
                placeholder="Patient Full Name"
                required
              />
              <input
                type="tel"
                id="patientEmail"
                placeholder="Contact Phone"
                required
              />
            </div>
            <div class="form-group">
              <select id="specialty" required>
                <option value="">Choose Specialist...</option>
                <option value="Cardiology">Cardiology</option>
                <option value="Neurology">Neurology</option>
                <option value="Pediatrics">Pediatrics</option>
                <option value="General Checkup">General Checkup</option>
              </select>
              <input type="datetime-local" id="appointmentDate" required />
            </div>
            <button type="submit" id="submitBtn">Confirm Booking</button>
          </form>
          <p id="statusMsg"></p>
        </div>
      </section>

      <section class="appointments-section" id="apptsection">
        <div class="list-header">
          <span id="apptCounter">0 Appointments</span>
        </div>
        <div id="appointmentGrid" class="grid-container"></div>
      </section>
    </main>

    <footer>
      <p>&copy; <span id="year">2026</span> All Rights Reserved | Developed by <strong>Musab Ahmed</strong></p>
    </footer>


    <script src="man.js"></script>
  </body>
</html>
